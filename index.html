<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Flashcards: Joy & Volunteering</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #FFD700; /* Amarillo brillante para niños */
            --secondary: #4CAF50; /* Verde vibrante */
            --accent: #E91E63; /* Rosa para alegría */
            --text-dark: #333;
            --bg-color: #F0F8FF; /* Azul cielo suave */
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #app-container {
            width: 100%;
            max-width: 600px;
            perspective: 1000px; /* Para efecto 3D */
            text-align: center;
        }

        .flashcard-wrapper {
            width: 100%;
            height: 480px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            border-radius: 25px;
            background: white;
            border: 5px solid var(--primary);
        }

        .flashcard-wrapper.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            box-sizing: border-box;
            border-radius: 20px;
        }

        .card-front {
            background: white;
        }

        .card-back {
            transform: rotateY(180deg);
            background: var(--accent);
            color: white;
            border: 5px solid white;
        }

        .vocab-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 3px solid #eee;
        }

        .text-en { font-size: 26px; font-weight: bold; color: var(--text-dark); margin-bottom: 10px; }
        .text-es { font-size: 28px; font-weight: bold; }
        .example-sentence { font-size: 16px; margin-top: 15px; font-style: italic; color: #666; background: #f9f9f9; padding: 10px; border-radius: 10px;}
        .example-sentence-es { font-size: 16px; margin-top: 10px; color: #eee; }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: var(--secondary);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
            font-family: inherit;
        }

        button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Pantalla final */
        #game-over-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 50px;
            border-radius: 30px;
            border: 5px solid var(--accent);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .input-group {
            margin: 20px 0;
            width: 100%;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #player-name {
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #ccc;
            font-family: inherit;
            width: 60%;
        }

        #player-history {
            text-align: left;
            width: 100%;
            margin-top: 30px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        #player-history h3 { margin-top: 0; color: var(--accent); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="flashcard-wrapper" class="flashcard-wrapper">
        <div class="card-face card-front">
            <img id="vocab-image" class="vocab-img" src="" alt="Vocabulary Image">
            <div id="vocab-en" class="text-en"></div>
            <div id="sentence-en" class="example-sentence"></div>
        </div>
        <div class="card-face card-back">
            <div id="vocab-es" class="text-es"></div>
            <div id="sentence-es" class="example-sentence-es"></div>
        </div>
    </div>

    <div class="controls">
        <button id="next-btn" disabled>SIGUIENTE</button>
    </div>
</div>

<div id="game-over-screen">
    <h1 style="color: var(--accent); font-size: 48px; margin-bottom: 0;">GAME OVER</h1>
    <p style="font-size: 20px;">¡Increíble trabajo! Has completado el set.</p>
    <div class="input-group">
        <input type="text" id="player-name" placeholder="Escribe tu nombre aquí...">
        <button onclick="registerPlayer()">REGISTRAR NOMBRE</button>
    </div>
    <div id="player-history">
        <h3>Lista Total de Participantes:</h3>
        <ul id="players-list" style="list-style: none; padding: 0;"></ul>
    </div>
</div>

<script>
    // Vocabulario completo con imágenes reales (de Unsplash/Pexels) y ejemplos gramaticales.
    const vocabularyList = [
        { en: "VOLUNTEERING ACTIVITY", es: "ACTIVIDAD DE VOLUNTARIADO", img: "https://images.unsplash.com/photo-1618510050511-610143896b01?w=600", sEn: "We help with a volunteering activity. We helped with a volunteering activity.", sEs: "Ayudamos con una actividad de voluntariado. Ayudamos con una actividad de voluntariado." },
        { en: "CHARITY ORGANIZATIONS", es: "ORGANIZACIONES BENÉFICAS", img: "https://images.unsplash.com/photo-1593113598332-cd288d649433?w=600", sEn: "Charity organizations support many kids. Charity organizations supported many kids.", sEs: "Las organizaciones benéficas apoyan a muchos niños. Las organizaciones benéficas apoyaron a muchos niños." },
        { en: "LAUGHTER THERAPY", es: "RISOTERAPIA", img: "https://images.pexels.com/photos/3933221/pexels-photo-3933221.jpeg?auto=compress&cs=tinysrgb&w=600", sEn: "Doctors use laughter therapy for children. Doctors used laughter therapy for children.", sEs: "Los doctores usan la risoterapia para los niños. Los doctores usaron la risoterapia para los niños." },
        { en: "HE WAS BORN IN QUERETARO CITY", es: "ÉL NACIÓ EN LA CIUDAD DE QUERÉTARO", img: "https://images.unsplash.com/photo-1620138541253-128a39d89953?w=600", sEn: "He was born in Queretaro City last year. He was born in Queretaro City last year.", sEs: "Él nació en la ciudad de Querétaro el año pasado. Él nació en la ciudad de Querétaro el año pasado." },
        { en: "HE STUDIED TO BECOME A PROFESIONAL CLOWN", es: "ÉL ESTUDIÓ PARA CONVERTIRSE EN UN PAYASO PROFESIONAL", img: "https://images.pexels.com/photos/1586942/pexels-photo-1586942.jpeg?auto=compress&cs=tinysrgb&w=600", sEn: "He studied to become a clown. He studied to become a clown.", sEs: "Él estudió para convertirse en payaso. Él estudió para convertirse en payaso." },
        { en: "HE CAME BACK TO MEXICO", es: "ÉL VOLVIÓ A MÉXICO", img: "https://images.pexels.com/photos/3389531/pexels-photo-3389531.jpeg?auto=compress&cs=tinysrgb&w=600", sEn: "He comes back to Mexico. He came back to Mexico.", sEs: "Él vuelve a México. Él volvió a México." },
        { en: "BASED ON THE PATCH ADAMS’ ORGANIZATION CONCEPT OF LAUGH DOCTORS", es: "BASADO EN EL CONCEPTO DE LA ORGANIZACIÓN DE PATCH ADAMS DE DOCTORES DE LA RISA", img: "https://images.pexels.com/photos/7108343/pexels-photo-7108343.jpeg?auto=compress&cs=tinysrgb&w=600", sEn: "The show is based on laugh doctors. The show was based on laugh doctors.", sEs: "El show está basado en doctores de la risa. El show estuvo basado en doctores de la risa." },
        { en: "CLOWNS WITHOUT BORDERS", es: "PAYASOS SIN FRONTERAS", img: "https://images.pexels.com/photos/1720188/pexels-photo-1720188.jpeg?auto=compress&cs=tinysrgb&w=600", sEn: "Clowns Without Borders visit schools. Clowns Without Borders visited schools.", sEs: "Payasos Sin Fronteras visitan escuelas. Payasos Sin Fronteras visitaron escuelas." },
        { en: "THEY GO TO HOSPITALS COMMITTED TO SHARE SYMPATHY AND HAPPINESS", es: "ELLOS VAN A LOS HOSPITALES COMPROMETIDOS A COMPARTIR SIMPATÍA Y FELICIDAD", img: "https://images.pexels.com/photos/1912868/pexels-photo-1912868.jpeg?auto=compress&cs=tinysrgb&w=600", sEn: "They go to hospitals every week. They went to hospitals every week.", sEs: "Ellos van a los hospitales cada semana. Ellos fueron a los hospitales cada semana." },
        { en: "TO PROMOTE CHEERFUL COOPERATION", es: "PROMOVER UNA COOPERACIÓN ALEGRE", img: "https://images.unsplash.com/photo-1522204523234-8729aa6e3d5f?w=600", sEn: "We promote cheerful cooperation. We promoted cheerful cooperation.", sEs: "Promovemos una cooperación alegre. Promovimos una cooperación alegre." },
        { en: "TO RECONSTRUCT SOCIAL ISSUES AND SOCIAL PEACE", es: "RECONSTRUIR PROBLEMAS SOCIALES Y LA PAZ SOCIAL", img: "https://images.unsplash.com/photo-1526628953301-3e589a6a8b74?w=600", sEn: "We reconstruct social peace. We reconstructed social peace.", sEs: "Reconstruimos la paz social. Reconstruimos la paz social." },
        { en: "TO JUST GIVE HOPE AND BRING JOY", es: "SOLO DAR ESPERANZA Y TRAER ALEGRÍA", img: "https://images.pexels.com/photos/346885/pexels-photo-346885.jpeg?auto=compress&cs=tinysrgb&w=600", sEn: "They give hope and bring joy. They gave hope and brought joy.", sEs: "Ellos dan esperanza y traen alegría. Ellos dieron esperanza y trajeron alegría." },
        { en: "THOSE WHO ARE IN PAIN OR ILL", es: "AQUELLOS QUE TIENEN DOLOR O ESTÁN ENFERMOS", img: "https://images.pexels.com/photos/1350563/pexels-photo-1350563.jpeg?auto=compress&cs=tinysrgb&w=600", sEn: "We visit those who are ill. We visited those who were ill.", sEs: "Visitamos a aquellos que están enfermos. Visitamos a aquellos que estaban enfermos." },
        { en: "A NON-PROFIT ORGANIZATION", es: "UNA ORGANIZACIÓN SIN FINES DE LUCRO", img: "https://images.unsplash.com/photo-1532629345422-7515f3d16bb8?w=600", sEn: "We work for a non-profit organization. We worked for a non-profit organization.", sEs: "Trabajamos para una organización sin fines de lucro. Trabajamos para una organización sin fines de lucro." },
        { en: "IT DOESN’T MATTER WHAT OCCUPATION YOU HAVE", es: "NO IMPORTA QUÉ OCUPACIÓN TENGAS", img: "https://images.unsplash.com/photo-1497515114629-f71d768fd07c?w=600", sEn: "Your occupation does not matter here. Your occupation did not matter here.", sEs: "Tu ocupación no importa aquí. Tu ocupación no importó aquí." },
        { en: "YOU CAN STILL BE PART OF THIS GROUP", es: "AÚN PUEDES SER PARTE DE ESTE GRUPO", img: "https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=600", sEn: "You can be part of this group. You could be part of this group.", sEs: "Tú puedes ser parte de este grupo. Tú pudiste ser parte de este grupo." },
        { en: "UP TO DATE", es: "ACTUALIZADO", img: "https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=600", sEn: "The report is up to date. The report was up to date.", sEs: "El reporte está actualizado. El reporte estuvo actualizado." },
        { en: "HUNDREDS OF VOLUNTEERS", es: "CIENTOS DE VOLUNTARIOS", img: "https://images.pexels.com/photos/1181676/pexels-photo-1181676.jpeg?auto=compress&cs=tinysrgb&w=600", sEn: "Hundreds of volunteers work together. Hundreds of volunteers worked together.", sEs: "Cientos de voluntarios trabajan juntos. Cientos de voluntarios trabajaron juntos." },
        { en: "THEY VISIT HOSPITALS AS WELL AS HOMES FOR THE ELDERLY", es: "ELLOS VISITAN HOSPITALES ASÍ COMO HOGARES DE ANCIANOS", img: "https://images.pexels.com/photos/339620/pexels-photo-339620.jpeg?auto=compress&cs=tinysrgb&w=600", sEn: "They visit homes for the elderly. They visited homes for the elderly.", sEs: "Ellos visitan hogares de ancianos. Ellos visitaron hogares de ancianos." },
        { en: "IF YOU WANT TO KNOW IT, RESEARCH FURTHER INFORMATION ON THE INTERNET.", es: "SI QUIERES SABERLO, INVESTIGA MÁS INFORMACIÓN EN INTERNET.", img: "https://images.pexels.com/photos/261628/pexels-photo-261628.jpeg?auto=compress&cs=tinysrgb&w=600", sEn: "We research information online. We researched information online.", sEs: "Investigamos información en línea. Investigamos información en línea." }
    ];

    let currentIdx = 0;
    let isFlipped = false;
    const cardWrapper = document.getElementById('flashcard-wrapper');
    const nextBtn = document.getElementById('next-btn');

    // Función principal para pronunciación (Inglés Americano)
    function speakEn(text) {
        window.speechSynthesis.cancel(); // Detener pronunciaciones anteriores
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.85; // Velocidad amigable para niños
        window.speechSynthesis.speak(utterance);
    }

    // Función principal para pronunciación (Español Latinoamericano / Ecuador)
    function speakEs(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        // Intentar usar una voz latina clara (usualmente 'es-MX' o 'es-US' son muy claras)
        utterance.lang = 'es-MX'; 
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    function loadCard() {
        const item = vocabularyList[currentIdx];
        document.getElementById('vocab-en').innerText = item.en;
        document.getElementById('sentence-en').innerText = item.sEn;
        document.getElementById('vocab-es').innerText = item.es;
        document.getElementById('sentence-es').innerText = item.sEs;
        document.getElementById('vocab-image').src = item.img;
        
        // Cargar sonidos reales relacionados (si los hay en la librería estándar de síntesis)
        // No es posible cargar archivos de sonido externos aquí sin usar bibliotecas masivas.
        // La pronunciación es el "sonido real" de la palabra.

        // Resetear estado
        cardWrapper.classList.remove('is-flipped');
        isFlipped = false;
        nextBtn.disabled = true;

        // Pronunciar automáticamente en inglés al cargar
        setTimeout(() => speakEn(item.en), 500);
    }

    // Evento para voltear la tarjeta
    cardWrapper.addEventListener('click', () => {
        cardWrapper.classList.toggle('is-flipped');
        isFlipped = !isFlipped;
        
        const item = vocabularyList[currentIdx];
        
        if (isFlipped) {
            // Efecto confeti al voltear
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 } });
            speakEs(item.es); // Pronunciar español al aparecer
            nextBtn.disabled = false; // Habilitar siguiente
        } else {
            speakEn(item.en); // Repetir inglés al volver
        }
    });

    // Evento para pasar a la siguiente tarjeta
    nextBtn.addEventListener('click', () => {
        currentIdx++;
        if (currentIdx < vocabularyList.length) {
            loadCard();
        } else {
            // Fin del juego
            document.getElementById('app-container').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'flex';
            loadHistory();
        }
    });

    // Gamificación: Registro de jugadores
    function registerPlayer() {
        const nameInput = document.getElementById('player-name').value;
        if (!nameInput) { alert("Por favor, ingresa tu nombre"); return; }
        
        let players = JSON.parse(localStorage.getItem('joy_players') || "[]");
        players.push(nameInput);
        localStorage.setItem('joy_players', JSON.stringify(players));
        
        document.getElementById('player-name').value = ""; // Limpiar input
        document.getElementById('player-name').disabled = true; // Deshabilitar
        loadHistory();
    }

    function loadHistory() {
        let players = JSON.parse(localStorage.getItem('joy_players') || "[]");
        const listUI = document.getElementById('players-list');
        listUI.innerHTML = players.map(p => `<li>✅ ${p}</li>`).join('');
    }

    // Iniciar
    loadCard();
</script>

</body>
</html>
